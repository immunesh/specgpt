name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # Code Quality & Type Checking
  # ============================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeCheck Backend
        run: npm run typecheck --workspace=backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: TypeCheck Frontend
        run: npm run typecheck --workspace=frontend

      - name: Lint Backend
        run: npm run lint --workspace=backend

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

  # ============================================================
  # Backend Tests
  # ============================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: specgpt_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=backend

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/specgpt_test

      - name: Run migrations
        run: npm run db:migrate:prod --workspace=backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/specgpt_test

      - name: Run tests
        run: npm run test --workspace=backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/specgpt_test
          JWT_SECRET: test_jwt_secret_at_least_64_chars_long_for_testing_purposes
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ============================================================
  # Frontend Tests
  # ============================================================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=frontend

      - name: Run tests
        run: npm run test --workspace=frontend

  # ============================================================
  # Build & Push Docker Images (main branch only)
  # ============================================================
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Production (manual approval required)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://5gspecgpt.com
    steps:
      - name: Deploy via SSH
        run: |
          echo "Deploy step — configure SSH + docker compose pull && up -d"
